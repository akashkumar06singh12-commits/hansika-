<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Hansika 💖</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 2.3em;
      color: #333;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      margin: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
    }

    #noBtn {
      background-color: #ff4d4d;
      color: white;
      position: absolute;
    }

    #page2 {
      display: none;
    }

    img {
      width: 250px;
      margin-top: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<canvas id="confetti"></canvas>

<!-- Page 1 -->
<div id="page1">
  <h1>Hansika 💖<br>Do you feel the same about me? ☺</h1>
  <button id="yesBtn" class="btn">Yes 😊</button>
  <button id="noBtn" class="btn">No 😢</button>
</div>

<!-- Page 2 -->
<div id="page2">
  <h1>You’re not just beautiful, you have such a wonderful vibe ☺</h1>

  <img src="https://media.tenor.com/6ovfO7cX3bMAAAAC/cute-bear.gif">

  <p style="font-size:20px;">
    I truly appreciate that you shared your hobbies with me.<br>
    Getting to know you has always been something I genuinely enjoy ☺
  </p>

  <p id="magicText" style="font-size:22px;"></p>

  <!-- Song -->
  <audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");

  // NO button run away
  noBtn.addEventListener("mouseover", function () {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  // Typing text
  const text = "You are supercalifragilisticexpialidocious ✨☺";
  let i = 0;

  function typeEffect() {
    if (i < text.length) {
      document.getElementById("magicText").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 50);
    }
  }

  // Confetti setup
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let pieces = [];

  function createConfetti() {
    for (let i = 0; i < 150; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 8 + 2,
        speedY: Math.random() * 3 + 1
      });
    }
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.fillStyle = "hsl(" + Math.random()*360 + ",100%,50%)";
      ctx.fillRect(p.x, p.y, p.size, p.size);
      p.y += p.speedY;
      if (p.y > canvas.height) p.y = 0;
    });
    requestAnimationFrame(drawConfetti);
  }

  // YES click
  yesBtn.addEventListener("click", function () {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";

    typeEffect();
    createConfetti();
    drawConfetti();

    let song = document.getElementById("song");
    song.currentTime = 0;
    song.play().catch(() => {
      alert("Tap anywhere to play music 🎵");
    });
  });
</script>

</body>
</html>
